

<!DOCTYPE html>
<html>
<head>
    <title>Team Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f0f1e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
        }

        canvas {
            display: block;
            cursor: none;
        }

        /* --- UI STYLES --- */
        .ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(15, 15, 30, 0.7);
            backdrop-filter: blur(5px);
        }

        .ui-panel {
            background: linear-gradient(145deg, #1a1a3e, #16213e);
            border: 1px solid #00ffff;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3),
                        inset 0 0 15px rgba(0, 255, 255, 0.1);
        }

        .menu-button {
            background: transparent;
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .menu-button:hover {
            background: #00ffff;
            color: #0f0f1e;
            box-shadow: 0 0 20px #00ffff;
            transform: scale(1.05);
        }

        .pause-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* --- Hero Select Styles --- */
        #heroSelectPanel {
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 0;
        }

        .hero-card {
            flex: 1 1 0;
            margin: 0;
            border: 2px solid #444;
            border-radius: 0;
            padding: 12px;
            background: rgba(20, 20, 30, 0.9);
            box-shadow: 0 0 8px rgba(0,0,0,0.6);
            cursor: pointer;
            width: 120px;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .hero-card.hovered {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,255,255,0.6);
            background: rgba(0, 255, 255, 0.1);
            border-color: #00ffff;
            transform: translateY(-5px) scale(1.02);
        }

        .hero-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .hero-name {
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- Hero Info Panel --- */
        #heroInfoPanel {
            position: relative;
            right: auto;
            top: auto;
            transform: none;
            margin-left: 20px;
            width: 30%;
            max-height: 80%;
        }
        #heroInfoPanel h2 {
            color: #00ffff;
            text-align: center;
            margin-top: 0;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            padding-bottom: 10px;
        }
        #heroInfoPanel h3 {
            color: #f0e68c;
            margin-top: 20px;
        }
        #heroInfoPanel p, #heroInfoPanel li {
            font-size: 0.9em;
            line-height: 1.5;
        }
        #heroInfoPanel ul {
            list-style-type: none;
            padding-left: 0;
        }
        #heroInfoPanel li {
            margin-bottom: 10px;
        }
        .ability-name {
            color: #00ffff;
            font-weight: bold;
        }
        .cooldown {
            color: #ff8c00;
            font-style: italic;
        }
        .keybind {
            color: #f0e68c;
            font-weight: bold;
            margin-left: 5px;
        }

        /* --- In-Game Hero UI --- */
        #heroUI {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid;
            background: rgba(22, 33, 62, 0.8);
            display: none;
            transition: all 0.3s ease;
        }
        #heroUI h3 {
            margin: 0 0 10px 0;
            padding: 0;
            font-size: 1.2em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #heroUI.hero-ui-active {
            box-shadow: 0 0 30px currentColor;
            border-width: 3px;
            transform: scale(1.05);
        }
        #healthBar {
            width: 200px;
            height: 20px;
            background: rgba(50, 50, 50, 0.7);
            border: 1px solid #00ffff;
            border-radius: 10px;
            overflow: hidden;
        }
        #healthBarFill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff4136, #ff851b);
            transition: width 0.3s ease;
        }

        /* --- Ability Bar UI --- */
        #abilityBar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 10px;
            padding: 10px;
            background: rgba(22, 33, 62, 0.7);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            align-items: flex-end;
        }
        .ability-slot {
            width: 60px;
            height: 60px;
            border: 2px solid #4a4a6a;
            border-radius: 8px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            color: #888;
            text-shadow: 0 0 5px black;
            font-weight: bold;
        }
        .ability-slot.ready {
            border-color: #00ffff;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }
        .ability-slot.ultimate {
            border-color: #f0e68c;
            color: #f0e68c;
            text-shadow: 0 0 10px #f0e68c;
        }
        .ability-slot.ultimate.ready {
            animation: pulse-ultimate 1.5s infinite;
        }
        @keyframes pulse-ultimate {
            0% { box-shadow: 0 0 5px #f0e68c; }
            50% { box-shadow: 0 0 20px #f0e68c, 0 0 30px #f0e68c; }
            100% { box-shadow: 0 0 5px #f0e68c; }
        }
        .ability-keybind {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 10px;
            color: #ccc;
            font-family: monospace;
        }
        .cooldown-overlay, .charge-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 15, 30, 0.8);
            border-radius: 6px;
            transition: height 0.1s linear;
        }
        .charge-overlay {
            background: linear-gradient(to top, #f0e68c, #fff700);
        }
        
        /* --- Ammo Counter UI --- */
        #ammoCounter {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 1.5em;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffff;
            display: none;
        }
        
        /* --- Team UI --- */
        #teamUI {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 250px;
            background: rgba(22, 33, 62, 0.7);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 10px;
            display: none;
        }
        
        .team-header {
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 10px;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .team-member {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            padding: 5px;
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.3);
        }
        
        .team-member-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin-right: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }
        
        .team-member-info {
            flex: 1;
        }
        
        .team-member-name {
            font-size: 0.9em;
            font-weight: bold;
        }
        
        .team-member-health {
            height: 4px;
            background: rgba(50, 50, 50, 0.7);
            border-radius: 2px;
            margin-top: 3px;
            overflow: hidden;
        }
        
        .team-member-health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4136, #ff851b);
        }
        
        .enemy-team {
            margin-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 10px;
        }
        
        .enemy-team-header {
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 10px;
            color: #ff4136;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .enemy-member {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            padding: 5px;
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.3);
        }
        
        .enemy-member-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin-right: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }
        
        .enemy-member-info {
            flex: 1;
        }
        
        .enemy-member-name {
            font-size: 0.9em;
            font-weight: bold;
        }
        
        .enemy-member-health {
            height: 4px;
            background: rgba(50, 50, 50, 0.7);
            border-radius: 2px;
            margin-top: 3px;
            overflow: hidden;
        }
        
        .enemy-member-health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4136, #ff851b);
        }
        
        /* --- Score UI --- */
        #scoreUI {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(22, 33, 62, 0.7);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 10px 20px;
            display: none;
            text-align: center;
        }
        
        .score-display {
            font-size: 1.5em;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }
        
        .score-team {
            display: inline-block;
            margin: 0 15px;
        }
        
        .score-value {
            font-size: 1.2em;
        }
        
        /* --- Minimap --- */
        #minimap {
            position: absolute;
            bottom: 100px;
            right: 20px;
            width: 200px;
            height: 200px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            display: none;
        }
        
        /* --- Victory/Defeat Screen --- */
        #gameEndScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
        }
        
        .game-end-panel {
            background: linear-gradient(145deg, #1a1a3e, #16213e);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
        }
        
        .game-end-title {
            font-size: 3em;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .victory-title {
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
        }
        
        .defeat-title {
            color: #ff4136;
            text-shadow: 0 0 20px #ff4136;
        }
        
        .game-end-stats {
            margin: 20px 0;
            font-size: 1.2em;
        }
        
        .game-end-button {
            background: transparent;
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }
        
        .game-end-button:hover {
            background: #00ffff;
            color: #0f0f1e;
            box-shadow: 0 0 20px #00ffff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- Main Menu UI -->
    <div id="mainMenu" class="ui-container">
        <div class="ui-panel">
            <h1 style="color: #00ffff; margin-top:0;">Team Arena</h1>
            <button class="menu-button" id="startButton">Start Game</button>
        </div>
    </div>

    <!-- Hero Selection UI -->
    <div id="heroSelect" class="ui-container">
        <div class="ui-panel">
            <h1 style="color: #00ffff; margin-top:0;">Select Hero</h1>
            <div id="heroSelectPanel"></div>
        </div>
        <!-- Hero Info Panel -->
        <div id="heroInfoPanel"></div>
    </div>

    <!-- Pause Menu UI -->
    <div id="pauseMenu" class="ui-container">
        <div class="ui-panel">
            <h1>PAUSED</h1>
            <div class="pause-buttons">
                <button class="menu-button" id="resumeButton">Resume</button>
                <button class="menu-button" id="mainMenuButton">Main Menu</button>
            </div>
        </div>
    </div>

    <!-- In-Game Hero UI -->
    <div id="heroUI">
        <h3 id="heroNameDisplay">Hero</h3>
        <div id="healthBar"><div id="healthBarFill"></div></div>
    </div>

    <!-- Ability Bar UI -->
    <div id="abilityBar">
        <div class="ability-slot" id="ability-LMB">
            <span></span>
            <div class="ability-keybind">LMB</div>
            <div class="cooldown-overlay"></div>
        </div>
        <div class="ability-slot" id="ability-RMB">
            <span></span>
            <div class="ability-keybind">RMB</div>
            <div class="cooldown-overlay"></div>
        </div>
        <div class="ability-slot" id="ability-E">
            <span></span>
            <div class="ability-keybind">E</div>
            <div class="cooldown-overlay"></div>
        </div>
        <div class="ability-slot" id="ability-Shift">
            <span></span>
            <div class="ability-keybind">SHIFT</div>
            <div class="cooldown-overlay"></div>
        </div>
        <div class="ability-slot ultimate" id="ability-Ult">
            <span></span>
            <div class="ability-keybind">Q</div>
            <div class="charge-overlay"></div>
        </div>
    </div>
    
    <!-- Ammo Counter UI -->
    <div id="ammoCounter">8 / 8</div>
    
    <!-- Team UI -->
    <div id="teamUI">
        <div class="team-header">Your Team</div>
        <div id="teamMembers"></div>
        <div class="enemy-team">
            <div class="enemy-team-header">Enemy Team</div>
            <div id="enemyMembers"></div>
        </div>
    </div>
    
    <!-- Score UI -->
    <div id="scoreUI">
        <div class="score-display">
            <span class="score-team" style="color: #00ffff;">Blue: <span class="score-value" id="blueScore">0%</span></span>
            <span class="score-team" style="color: #ff4136;">Red: <span class="score-value" id="redScore">0%</span></span>
        </div>
    </div>
    
    <!-- Minimap -->
    <canvas id="minimap"></canvas>
    
    <!-- Victory/Defeat Screen -->
    <div id="gameEndScreen">
        <div class="game-end-panel">
            <h1 class="game-end-title" id="gameEndTitle">VICTORY</h1>
            <div class="game-end-stats">
                <div>Kills: <span id="playerKills">0</span></div>
                <div>Deaths: <span id="playerDeaths">0</span></div>
                <div>Assists: <span id="playerAssists">0</span></div>
            </div>
            <button class="game-end-button" id="playAgainButton">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const minimap = document.getElementById('minimap');
        const minimapCtx = minimap.getContext('2d');

        // --- UI ELEMENTS ---
        const mainMenuEl = document.getElementById('mainMenu');
        const heroSelectEl = document.getElementById('heroSelect');
        const pauseMenuEl = document.getElementById('pauseMenu');
        const heroUIEl = document.getElementById('heroUI');
        const heroNameDisplayEl = document.getElementById('heroNameDisplay');
        const healthBarFillEl = document.getElementById('healthBarFill');
        const abilityBarEl = document.getElementById('abilityBar');
        const ammoCounterEl = document.getElementById('ammoCounter');
        const heroInfoPanelEl = document.getElementById('heroInfoPanel');
        const startButton = document.getElementById('startButton');
        const resumeButton = document.getElementById('resumeButton');
        const mainMenuButton = document.getElementById('mainMenuButton');
        const heroSelectPanel = document.getElementById('heroSelectPanel');
        const teamUIEl = document.getElementById('teamUI');
        const scoreUIEl = document.getElementById('scoreUI');
        const gameEndScreenEl = document.getElementById('gameEndScreen');
        const gameEndTitleEl = document.getElementById('gameEndTitle');
        const playerKillsEl = document.getElementById('playerKills');
        const playerDeathsEl = document.getElementById('playerDeaths');
        const playerAssistsEl = document.getElementById('playerAssists');
        const playAgainButton = document.getElementById('playAgainButton');
        const blueScoreEl = document.getElementById('blueScore');
        const redScoreEl = document.getElementById('redScore');

        // --- CONFIGURATION ---
        const WORLD_WIDTH = 5000;
        const WORLD_HEIGHT = 5000;
        const PLAYER_SPEED = 5;
        const PLAYER_SIZE = 15;
        const HEX_SIZE = 40;
        const NUM_PARTICLES = 150;
        const RESELECT_HOLD_TIME = 1500;
        const TEAM_SIZE = 3; // 3v3 for now, but designed for 5v5
        const RELOAD_TIME = 2000;
        const MAX_AMMO = 8;
        const PLAYER_MAX_HEALTH = 200;
        const ENEMY_MAX_HEALTH = 200;
        const ULT_MAX_CHARGE = 100;
        const ULT_PASSIVE_CHARGE_RATE = 1;
        const ULT_DAMAGE_CHARGE_FACTOR = 0.5;
        const RESPAWN_TIME = 3000;
        const VICTORY_SCORE = 100; // Changed to 100% capture for victory
        const CAPTURE_POINT_RADIUS = 100;
        const CAPTURE_RATE = 0.02;
        const MAX_CAPTURE_PROGRESS = 100;
        const SEPARATION_RADIUS = 50; // New: minimum spacing between units
        const GRID_SIZE = 75; // New: spatial hash grid size

        // --- COLORS ---
        const colors = {
            background: '#0f0f1e',
            grid: '#1a1a3e',
            player: '#00ffff',
            cursor: '#ff00ff',
            particle: 'rgba(255, 255, 255, 0.5)',
            spawnArea: 'rgba(0, 255, 255, 0.15)',
            spawnAreaBorder: '#00ffff',
            enemy: '#ff0000',
            enemyAffected: '#ff6666',
            blueTeam: '#00aaff',
            redTeam: '#ff3333',
            capturePoint: '#ffff00'
        };
        
        // --- HERO DATA ---
        const heroes = [
            { // Hero 1: Flux
                name: 'Flux',
                role: 'Disruptor / Controller',
                theme: 'A scientist turned rogue, wielding portable singularities and warped space.',
                color: '#00ffff',
                maxAmmo: 8,
                abilities: {
                    LMB: { name: 'Graviton Bolt', cooldown: 400, icon: '>', damage: 15, aoeDamage: 25, description: 'Fires a bolt that explodes at a medium range, dealing area damage.' },
                    RMB: { name: 'Repulsion Wave', cooldown: 4000, icon: '⋙', description: 'A quick cone blast that shoves enemies back.' },
                    E: { name: 'Singularity Orb', cooldown: 12000, icon: '◎', description: 'Tosses a hovering orb that activates after a short delay, pulling enemies inward while slowing them.' },
                    Shift: { name: 'Gravity Well', cooldown: 15000, icon: '⦿', description: 'Creates a 3-meter aura around Flux for 5 seconds. Allies inside feel "lightened", enemies feel "heavier".' },
                    Ult: { name: 'Event Horizon (Q)', icon: '◉', description: 'Unleashes a massive gravitational field for 5 seconds. Ult.' }
                }
            },
            { // Hero 2: Aegis
                name: 'Aegis',
                role: 'Tank / Protector',
                theme: 'A biomechanical guardian wielding radiant hard-light technology to shield allies and disrupt foes.',
                color: '#FFD700',
                maxAmmo: 4,
                abilities: {
                    LMB: { name: 'Radiant Slam', cooldown: 600, icon: '⚔', damage: 35, description: 'Heavy melee swing that sends out a short golden shockwave.' },
                    RMB: { name: 'Guard Bash', cooldown: 3000, icon: '⛨', damage: 20, description: 'Short forward bash that pushes enemies back 4m and interrupts channeled abilities.' },
                    E: { name: 'Ward Projection', cooldown: 12000, icon: '🛡', description: 'Deploys a mobile shield wall that orbits the nearest ally for 5s, blocking projectiles (800 HP).' },
                    Shift: { name: 'Bulwark Leap', cooldown: 14000, icon: '⬇', damage: 30, description: 'Jumps to a location within 8m, slams down, and taunts enemies in 4m radius for 2s.' },
                    Ult: { name: 'Sanctuary Dome', icon: '⬭', description: 'Deploys a huge dome (8m radius) that absorbs all incoming ranged attacks for 6s. Allies inside gain 20% damage reduction.' }
                }
            },
            { // Hero 3: Nyx
                name: 'Nyx',
                role: 'Flanker / Assassin',
                theme: 'Silent shadow killer — thrives on precision, stealth, and hit-and-run tactics.',
                color: '#9D2933',
                maxAmmo: 6,
                abilities: {
                    LMB: { name: 'Silencer Rounds', cooldown: 200, icon: '•', damage: 20, description: '20 dmg per bullet, very low recoil, quiet. Enemies hit are briefly "tagged" with a faint shimmer visible only to Nyx.' },
                    RMB: { name: 'Shadow Knife', cooldown: 4000, icon: '⚔', damage: 50, description: 'Knife doesn\'t consume ammo. Kill with knife = ammo instantly refilled.' },
                    E: { name: 'Shadowmeld', cooldown: 8000, icon: '◯', description: 'Does not pause reload — she can reload while invisible.' },
                    Shift: { name: 'Phase Dash', cooldown: 3000, icon: '↗', description: 'Consumes 1 bullet in addition to cooldown. Dash fails if out of ammo.' },
                    Ult: { name: 'Death Mark', icon: '✦', description: 'After the blink/execution, Nyx\'s mag is automatically refilled.' }
                }
            }
        ];

        // --- GAME STATE ---
        let gameState = 'mainMenu';
        let activeHero = null;
        let player = {
            x: WORLD_WIDTH / 2,
            y: WORLD_HEIGHT / 2,
            angle: 0,
            vx: 0,
            vy: 0,
            ammo: MAX_AMMO,
            isReloading: false,
            reloadStartTime: 0,
            health: PLAYER_MAX_HEALTH,
            maxHealth: PLAYER_MAX_HEALTH,
            ultCharge: 0,
            isDead: false,
            deathTime: 0,
            headshotTracker: 0,
            isInvisible: false,
            invisibilityEndTime: 0,
            team: 'blue',
            kills: 0,
            deaths: 0,
            assists: 0,
            id: 'player',
            separationRadius: SEPARATION_RADIUS
        };
        let camera = { x: 0, y: 0 };
        let mouse = { x: 0, y: 0 };
        let keys = {};
        let mouseButtons = {};
        let particles = [];
        let teammates = [];
        let enemies = [];
        let projectiles = [];
        let activeAbilities = [];
        let blueSpawnArea = { x: WORLD_WIDTH / 4, y: WORLD_HEIGHT / 2, radius: 150 };

        // --- SPATIAL HASH FOR PERFORMANCE ---
        function buildSpatialHash(entities) {
            spatialHash = {};
            entities.forEach(entity => {
                const gridX = Math.floor(entity.x / GRID_SIZE);
                const gridY = Math.floor(entity.y / GRID_SIZE);
                const key = `${gridX},${gridY}`;
                
                if (!spatialHash[key]) {
                    spatialHash[key] = [];
                }
                spatialHash[key].push(entity);
            });
        }

        function queryHash(x, y, radius) {
            const neighbors = [];
            const minX = Math.floor((x - radius) / GRID_SIZE);
            const maxX = Math.floor((x + radius) / GRID_SIZE);
            const minY = Math.floor((y - radius) / GRID_SIZE);
            const maxY = Math.floor((y + radius) / GRID_SIZE);
            
            for (let gx = minX; gx <= maxX; gx++) {
                for (let gy = minY; gy <= maxY; gy++) {
                    const key = `${gx},${gy}`;
                    if (spatialHash[key]) {
                        spatialHash[key].forEach(entity => {
                            const dx = entity.x - x;
                            const dy = entity.y - y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist <= radius) {
                                neighbors.push(entity);
                            }
                        });
                    }
                }
            }
            
            return neighbors;
        }

        function getNeighbors(character) {
            return queryHash(character.x, character.y, character.separationRadius * 2);
        }

        function computeSeparationForce(character, neighbors) {
            let forceX = 0;
            let forceY = 0;
            let count = 0;
            
            neighbors.forEach(neighbor => {
                if (neighbor === character) return;
                
                const dx = character.x - neighbor.x;
                const dy = character.y - neighbor.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < character.separationRadius && dist > 0) {
                    // Normalize and scale by inverse distance
                    const scale = 1.0 - (dist / character.separationRadius);
                    forceX += (dx / dist) * scale;
                    forceY += (dy / dist) * scale;
                    count++;
                }
            });
            
            if (count > 0) {
                forceX /= count;
                forceY /= count;
            }
            
            return { x: forceX, y: forceY };
        }

        function steerTo(character, targetX, targetY, weightSeek, weightSeparate) {
            // Calculate seek force
            const dx = targetX - character.x;
            const dy = targetY - character.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            let seekX = 0;
            let seekY = 0;
            
            if (dist > 0) {
                seekX = (dx / dist) * weightSeek;
                seekY = (dy / dist) * weightSeek;
            }
            
            // Get neighbors and calculate separation force
            const neighbors = getNeighbors(character);
            const separation = computeSeparationForce(character, neighbors);
            
            // Combine forces
            character.vx += seekX + separation.x * weightSeparate;
            character.vy += seekY + separation.y * weightSeparate;
            
            // Clamp max speed
            const speed = Math.sqrt(character.vx * character.vx + character.vy * character.vy);
            const maxSpeed = 5;
            if (speed > maxSpeed) {
                character.vx = (character.vx / speed) * maxSpeed;
                character.vy = (character.vy / speed) * maxSpeed;
            }
        }

        function startReload(character = player) {
            if (character.isReloading || !character.hero) return;
            if (character.ammo === character.hero.maxAmmo) return;

            character.isReloading = true;
            character.reloadStartTime = Date.now();
            
            // Nyx reloads faster (1s vs 2s default)
            const reloadTime = character.hero.name === 'Nyx' ? 1000 : RELOAD_TIME;
        }

        function updateReload() {
            // Update player reload
            if (player.isReloading) {
                const reloadTime = activeHero.name === 'Nyx' ? 1000 : RELOAD_TIME;
                const elapsed = Date.now() - player.reloadStartTime;
                const progress = Math.min(elapsed / reloadTime, 1);

                const dots = Math.floor(progress * activeHero.maxAmmo);
                ammoCounterEl.textContent = `Reloading [${'▮'.repeat(dots)}${'▯'.repeat(activeHero.maxAmmo - dots)}]`;

                if (progress >= 1) {
                    player.ammo = activeHero.maxAmmo;
                    player.isReloading = false;
                    updateAmmoUI();
                }
            }
            
            // Update teammate reloads
            teammates.forEach(teammate => {
                if (teammate.isReloading) {
                    const reloadTime = teammate.hero.name === 'Nyx' ? 1000 : RELOAD_TIME;
                    const elapsed = Date.now() - teammate.reloadStartTime;
                    const progress = Math.min(elapsed / reloadTime, 1);

                    if (progress >= 1) {
                        teammate.ammo = teammate.hero.maxAmmo;
                        teammate.isReloading = false;
                    }
                }
            });
            
            // Update enemy reloads
            enemies.forEach(enemy => {
                if (enemy.isReloading) {
                    const reloadTime = enemy.hero.name === 'Nyx' ? 1000 : RELOAD_TIME;
                    const elapsed = Date.now() - enemy.reloadStartTime;
                    const progress = Math.min(elapsed / reloadTime, 1);

                    if (progress >= 1) {
                        enemy.ammo = enemy.hero.maxAmmo;
                        enemy.isReloading = false;
                    }
                }
            });
        }
     
        function isOnCooldown(abilityName, character = player) {
            const cooldowns = character === player ? abilityCooldowns : character.abilityCooldowns;
            return cooldowns[abilityName] && cooldowns[abilityName] > Date.now();
        }

        function setCooldown(abilityName, duration, character = player) {
            const cooldowns = character === player ? abilityCooldowns : character.abilityCooldowns;
            cooldowns[abilityName] = Date.now() + duration;
        }
        
        function addUltCharge(amount, character = player) {
            character.ultCharge = Math.min(character.ultCharge + amount, ULT_MAX_CHARGE);
        }

    // Check if character is in spawn area
    character.isInSpawnArea = isInSpawnArea(character, 
        character.team === 'blue' ? blueSpawnArea : redSpawnArea);
    
    // Build spatial hash for all units
    const allUnits = [player, ...teammates, ...enemies].filter(u => !u.isDead);
    buildSpatialHash(allUnits);
    
    // Update AI state with objective focus
    if (now - character.aiStateTime > 2000 + Math.random() * 1000) { // Add random jitter
        // Find nearest enemy
        let nearestEnemy = null;
        let nearestDist = Infinity;
        
        const targets = character.team === 'blue' ? enemies : [...teammates, player];
        targets.forEach(target => {
            if (target.health <= 0) return;
            const dx = target.x - character.x;
            const dy = target.y - character.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < nearestDist) {
                nearestDist = dist;
                nearestEnemy = target;
            }
        });
        
        // Find team leader to follow
        let teamLeader = character.team === 'blue' ? player : teammates[0];
        if (character.team === 'red') {
            teamLeader = enemies[0];
        }
        
        // Find nearest capture point
        let nearestPoint = null;
        let pointDist = Infinity;
        capturePoints.forEach(point => {
            const dx = point.x - character.x;
            const dy = point.y - character.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < pointDist) {
                pointDist = dist;
                nearestPoint = point;
            }
        });
        
        // Decide on AI state with objective focus
        if (nearestEnemy && nearestDist < 300) {
            character.aiState = 'combat';
            character.aiTarget = nearestEnemy;
            character.lastTargetLostTime = 0;
        } else if (nearestEnemy && nearestDist < 600) {
            character.aiState = 'approach';
            character.aiTarget = nearestEnemy;
            character.lastTargetLostTime = 0;
        } else if (nearestPoint && (character.lastTargetLostTime === 0 || now - character.lastTargetLostTime > 3000)) {
            // Go to capture point if not in combat or haven't seen enemies in 3 seconds
            character.aiState = 'objective';
            character.aiTarget = nearestPoint;
        } else if (teamLeader && character !== teamLeader) {
            // Follow team leader if not the leader
            character.aiState = 'follow';
            character.aiTarget = teamLeader;
        } else {
            character.aiState = 'idle';
            character.aiTarget = null;
        }
        
        character.aiStateTime = now;
    }
    
    // Execute AI behavior based on state
    switch (character.aiState) {
        case 'idle':
            // Wander around with separation
            if (Math.random() < 0.02) {
                character.angle = Math.random() * Math.PI * 2;
            }
            
            // Apply steering with separation
            const targetX = character.x + Math.cos(character.angle) * 100;
            const targetY = character.y + Math.sin(character.angle) * 100;
            steerTo(character, targetX, targetY, 0.3, 0.5);
            break;
            
        case 'follow':
            // Follow team leader with formation
            if (character.aiTarget) {
                const dx = character.aiTarget.x - character.x;
                const dy = character.aiTarget.y - character.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                // Maintain formation with angular offset
                const followDist = 100;
                const angleOffset = character.preferredAngle;
                const targetX = character.aiTarget.x - Math.cos(character.aiTarget.angle + angleOffset) * followDist;
                const targetY = character.aiTarget.y - Math.sin(character.aiTarget.angle + angleOffset) * followDist;
                
                // Apply steering with separation
                steerTo(character, targetX, targetY, 0.5, 0.5);
            }
            break;
            
        case 'approach':
            // Move towards target as a group with separation
            if (character.aiTarget) {
                const dx = character.aiTarget.x - character.x;
                const dy = character.aiTarget.y - character.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                // Apply steering with separation
                steerTo(character, character.aiTarget.x, character.aiTarget.y, 0.5, 0.5);
            }
            break;
            
        case 'combat':
            // Fight target with tactical movement
            if (character.aiTarget) {
                const dx = character.aiTarget.x - character.x;
                const dy = character.aiTarget.y - character.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                // Aim at target
                character.angle = Math.atan2(dy, dx);
                
                // Use abilities with tactical conditions
                const abilityCheck = Math.random() < 0.05; // Add random jitter to ability usage
                
                if (abilityCheck && !isOnCooldown('LMB', character) && character.ammo > 0) {
                    // Check if facing target and in range
                    const angleToTarget = Math.atan2(dy, dx);
                    let angleDiff = angleToTarget - character.angle;
                    angleDiff = Math.atan2(Math.sin(angleDiff), Math.cos(angleDiff));
                    
                    if (Math.abs(angleDiff) < Math.PI / 6 && dist < 400) {
                        activateAbility('LMB', character);
                        setCooldown('LMB', hero.abilities.LMB.cooldown, character);
                    }
                }
                
                if (Math.random() < 0.02 && !isOnCooldown('RMB', character) && character.ammo > 0) {
                    // Check if facing target and in range
                    const angleToTarget = Math.atan2(dy, dx);
                    let angleDiff = angleToTarget - character.angle;
                    angleDiff = Math.atan2(Math.sin(angleDiff), Math.cos(angleDiff));
                    
                    if (Math.abs(angleDiff) < Math.PI / 4 && dist < 200) {
                        activateAbility('RMB', character);
                        setCooldown('RMB', hero.abilities.RMB.cooldown, character);
                    }
                }
                
                if (Math.random() < 0.01 && !isOnCooldown('E', character)) {
                    activateAbility('E', character);
                    setCooldown('E', hero.abilities.E.cooldown, character);
                }
                
                if (Math.random() < 0.01 && !isOnCooldown('Shift', character)) {
                    activateAbility('Shift', character);
                    setCooldown('Shift', hero.abilities.Shift.cooldown, character);
                }
                
                if (Math.random() < 0.005 && character.ultCharge >= ULT_MAX_CHARGE) {
                    activateAbility('Ult', character);
                }
                
                // Reload if out of ammo and safe
                if (character.ammo <= 0 && !character.isReloading && dist > 200) {
                    startReload(character);
                }
                
                // Move to maintain optimal distance with separation
                if (dist > 200) {
                    steerTo(character, character.aiTarget.x, character.aiTarget.y, 0.5, 0.5);
                } else if (dist < 100) {
                    // Back off
                    const retreatX = character.x - dx;
                    const retreatY = character.y - dy;
                    steerTo(character, retreatX, retreatY, 0.3, 0.5);
                } else {
                    // Strafe around target
                    const strafeAngle = Math.atan2(dy, dx) + Math.PI / 2;
                    const strafeX = character.x + Math.cos(strafeAngle) * 50;
                    const strafeY = character.y + Math.sin(strafeAngle) * 50;
                    steerTo(character, strafeX, strafeY, 0.3, 0.5);
                }
            }
            break;
            
        case 'objective':
            // Move to capture point with tactical movement
            if (character.aiTarget) {
                const dx = character.aiTarget.x - character.x;
                const dy = character.aiTarget.y - character.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                // Check if point is contested
                let contested = false;
                const enemiesInPoint = character.team === 'blue' ? enemies : [...teammates, player];
                enemiesInPoint.forEach(enemy => {
                    if (enemy.health <= 0) return;
                    const edx = enemy.x - character.aiTarget.x;
                    const edy = enemy.y - character.aiTarget.y;
                    const edist = Math.sqrt(edx*edx + edy*edy);
                    if (edist < character.aiTarget.radius) {
                        contested = true;
                    }
                });
                
                if (contested) {
                    // Move around the point in an arc
                    const arcAngle = Math.atan2(dy, dx) + Math.sin(now / 1000) * Math.PI / 3;
                    const arcDist = character.aiTarget.radius * 0.8;
                    const targetX = character.aiTarget.x + Math.cos(arcAngle) * arcDist;
                    const targetY = character.aiTarget.y + Math.sin(arcAngle) * arcDist;
                    steerTo(character, targetX, targetY, 0.4, 0.5);
                    
                    // Use abilities defensively
                    if (Math.random() < 0.03 && !isOnCooldown('RMB', character) && character.ammo > 0) {
                        activateAbility('RMB', character);
                        setCooldown('RMB', hero.abilities.RMB.cooldown, character);
                    }
                } else {
                    // Move to center of point
                    steerTo(character, character.aiTarget.x, character.aiTarget.y, 0.5, 0.5);
                }
                
                // Check for enemies and switch to combat if needed
                const nearbyEnemies = character.team === 'blue' ? enemies : [...teammates, player];
                nearbyEnemies.forEach(enemy => {
                    if (enemy.health <= 0) return;
                    const edx = enemy.x - character.x;
                    const edy = enemy.y - character.y;
                    const edist = Math.sqrt(edx*edx + edy*edy);
                    if (edist < 300) {
                        character.aiState = 'combat';
                        character.aiTarget = enemy;
                        character.aiStateTime = now;
                    }
                });
            }
            break;
    }
    
    // Track when target is lost
    if (character.aiState === 'combat' || character.aiState === 'approach') {
        if (!character.aiTarget || character.aiTarget.health <= 0) {
            character.lastTargetLostTime = now;
        }
    }
    
    // Apply physics
    character.vx *= 0.9;
    character.vy *= 0.9;
    
    const newX = character.x + character.vx;
    const newY = character.y + character.vy;
    
    // Check if character is trying to enter enemy spawn
    const enemySpawn = character.team === 'blue' ? redSpawnArea : blueSpawnArea;
    if (!isInSpawnArea({x: newX, y: newY}, enemySpawn)) {
        character.x = newX;
        character.y = newY;
    }
    
    // Keep in bounds
    character.x = Math.max(PLAYER_SIZE, Math.min(WORLD_WIDTH - PLAYER_SIZE, character.x));
    character.y = Math.max(PLAYER_SIZE, Math.min(WORLD_HEIGHT - PLAYER_SIZE, character.y));
    
    // Update invisibility
    if (character.isInvisible && Date.now() > character.invisibilityEndTime) {
        character.isInvisible = false;
    }
    
    // Passive ult charge
    addUltCharge(ULT_PASSIVE_CHARGE_RATE / 60, character);
}

		function selectHero(index) {
    activeHero = heroes[index];
    player.hero = activeHero;
    player.ammo = activeHero.maxAmmo;
    player.headshotTracker = 0;
    
    // Check if we're starting a new game or changing heroes
    const isNewGame = gameState === 'heroSelect';
    
    // Only reset player position when changing heroes, not the whole team
    if (!isNewGame && isPlayerInSpawnArea()) {
        // Just reset the player, not the teams
        resetPlayer();
        player.ammo = activeHero.maxAmmo;
    } else {
        startGame(isNewGame);
    }
}
		
		function isInSpawnArea(character, spawnArea) {
    const dx = character.x - spawnArea.x;
    const dy = character.y - spawnArea.y;
    return Math.sqrt(dx * dx + dy * dy) < spawnArea.radius;
}

        generateTeams();
        blueScore = 0;
        redScore = 0;

        capturePoints.forEach(point => {
            point.capturedBy = null;
            point.captureProgress = 0;

    }

        // --- UPDATE LOGIC ---
		function updatePlayer() {
    if (gameState !== 'playing' || player.isDead) return;

    let dx = 0, dy = 0;
    if (keys['w']) dy -= 1;
    if (keys['s']) dy += 1;
    if (keys['a']) dx -= 1;
    if (keys['d']) dx += 1;

    if (dx !== 0 || dy !== 0) {
        const len = Math.sqrt(dx * dx + dy * dy);
        dx /= len;
        dy /= len;
    }

    const accel = 0.6;
    const friction = 0.85;
    const maxSpeed = 6;

    player.vx += dx * accel;
    player.vy += dy * accel;

    player.vx *= friction;
    player.vy *= friction;

    const speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
    if (speed > maxSpeed) {
        player.vx = (player.vx / speed) * maxSpeed;
        player.vy = (player.vy / speed) * maxSpeed;
    }

    const newX = player.x + player.vx;
    const newY = player.y + player.vy;
    
    // Check if player is trying to enter enemy spawn
    if (!isInSpawnArea({x: newX, y: newY}, redSpawnArea)) {
        player.x = newX;
        player.y = newY;
    }
    
    // Check if player is in their own spawn (for invincibility)
    player.isInSpawnArea = isInSpawnArea(player, blueSpawnArea);

    player.x = Math.max(PLAYER_SIZE, Math.min(WORLD_WIDTH - PLAYER_SIZE, player.x));
    player.y = Math.max(PLAYER_SIZE, Math.min(WORLD_HEIGHT - PLAYER_SIZE, player.y));
    
    const worldMouseX = mouse.x + camera.x;
    const worldMouseY = mouse.y + camera.y;
    player.angle = Math.atan2(worldMouseY - player.y, worldMouseX - player.x);
    
    // Update invisibility
    if (player.isInvisible && Date.now() > player.invisibilityEndTime) {
        player.isInvisible = false;
    }
    
    // Passive ult charge
    addUltCharge(ULT_PASSIVE_CHARGE_RATE / 60);
}
       
        function updateReselect() {

            if (keys['r'] && isPlayerInSpawnArea()) {

                }
                rHoldProgress = Math.min(1, (Date.now() - rHoldStartTime) / RESELECT_HOLD_TIME);
                if (rHoldProgress >= 1) {

                    rHoldProgress = 0;
                    rHoldStartTime = 0;
                }
            } else {
                rHoldProgress = 0;
                rHoldStartTime = 0;
            }
        }

        function updateCamera() {
            if (gameState !== 'playing') return;
            const targetX = player.x - canvas.width / 2;
            const targetY = player.y - canvas.height / 2;

            camera.y += (targetY - camera.y) * 0.1;

        function updateParticles() {
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < 0) p.x = WORLD_WIDTH;
                if (p.x > WORLD_WIDTH) p.x = 0;
                if (p.y < 0) p.y = WORLD_HEIGHT;
                if (p.y > WORLD_HEIGHT) p.y = 0;
            });
        }

        function updateProjectiles() {
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];

                p.x += p.vx;
                p.y += p.vy;
                p.traveledDistance += Math.hypot(p.vx, p.vy);

                const outOfRange =
                    p.traveledDistance >= (p.maxDistance || 500) ||
                    p.x < 0 || p.x > WORLD_WIDTH ||
                    p.y < 0 || p.y > WORLD_HEIGHT;

                if (outOfRange) {
                    if (p.type === 'gravitonBolt') {
                        activeAbilities.push({
                            type: 'explosion',
                            x: p.x,
                            y: p.y,
                            radius: p.aoeRadius,
                            damage: p.aoeDamage,
                            lifetime: 200,
                            owner: p.owner
                        });
                    }
                    projectiles.splice(i, 1);
                    continue;
                }

                // Check collision with all characters
                const allTargets = [...enemies, ...teammates, player];
                for (let target of allTargets) {
                    if (target.health <= 0 || target === p.owner) continue;
                    
                    const dx = target.x - p.x;
                    const dy = target.y - p.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < target.size / 2 + p.size) {
                        applyDamage(target, p.damage, p.owner);
                        
                        // Nyx's headshot tracker
                        if (p.type === 'silencerRound' && p.owner.hero.name === 'Nyx') {
                            p.owner.headshotTracker++;
                            if (p.owner.headshotTracker >= 3) {
                                p.owner.ammo++;
                                p.owner.headshotTracker = 0;
                            }
                        }

                        if (p.type === 'gravitonBolt') {
                            activeAbilities.push({
                                type: 'explosion',
                                x: p.x,
                                y: p.y,
                                radius: p.aoeRadius,
                                damage: p.aoeDamage,
                                lifetime: 200,
                                owner: p.owner
                            });
                        }

                        projectiles.splice(i, 1);
                        break;
                    }

		function applyDamage(target, damage, source) {
    if (!target || target.health <= 0) return;
    
    // Check for friendly fire (disable for now)
    if (source && target.team === source.team) {
        return;
    }
    
    // Check if target is in spawn area (invincibility)
    if (target.isInSpawnArea) {
        return;
    }
    
    // Apply damage reduction if target is in sanctuary dome
    if (target.damageReduction) {
        damage *= (1 - target.damageReduction);
    }
    
    target.health -= damage;
    
    // Give ult charge to source
    if (source) {
        addUltCharge(damage * ULT_DAMAGE_CHARGE_FACTOR, source);
    }
    
    if (target.health <= 0) {
        target.health = 0;
        
        // Update stats
        if (source) {
            if (source === player) {
                player.kills++;
            } else if (source.team === 'blue') {
                // Find which teammate
                const teammate = teammates.find(t => t.id === source.id);
                if (teammate) teammate.kills++;
            } else {
                // Enemy got a kill
                const enemy = enemies.find(e => e.id === source.id);
                if (enemy) enemy.kills++;
            }
            
            // Check for assists
            const allPlayers = [...teammates, player];
            allPlayers.forEach(p => {
                if (p !== source && p.team === source.team) {
                    // Simple assist logic - if within range of the kill
                    const dx = p.x - target.x;
                    const dy = p.y - target.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 300) {
                        if (p === player) {
                            player.assists++;
                        } else {
                            const teammate = teammates.find(t => t.id === p.id);
                            if (teammate) teammate.assists++;
                        }
                    }
                }
            });
        }
        
        if (target === player) {
            handlePlayerDeath();
        } else {
            target.deathTime = Date.now();
            target.isDead = true;
        }
    }
}

        function handlePlayerDeath() {

        }

            character.y = spawnArea.y + (Math.random() - 0.5) * spawnArea.radius;

            character.vy = 0;

		function updateCapturePoints() {
            if (gameState !== 'playing' || gameEnded) return;
            
            capturePoints.forEach(point => {
                let blueInfluence = 0;
                let redInfluence = 0;
                
                // Check which team members are in the capture point
                [...teammates, player].forEach(char => {
                    if (char.health <= 0) return;
                    const dx = char.x - point.x;
                    const dy = char.y - point.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < point.radius) {
                        blueInfluence += 1;
                    }
                });
                
                enemies.forEach(enemy => {
                    if (enemy.health <= 0) return;
                    const dx = enemy.x - point.x;
                    const dy = enemy.y - point.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < point.radius) {
                        redInfluence += 1;
                    }
                });
                
                // Update capture progress with proper decay and contested logic
                if (blueInfluence > 0 && redInfluence === 0) {
                    // Blue team uncontested
                    if (point.capturedBy === 'red') {
                        // Decay red progress first
                        point.captureProgress += CAPTURE_RATE * blueInfluence;
                        if (point.captureProgress >= 0) {
                            point.captureProgress = 0;
                            point.capturedBy = null;
                        }
                    } else {
                        // Build blue progress
                        point.captureProgress += CAPTURE_RATE * blueInfluence;
                        if (point.captureProgress >= MAX_CAPTURE_PROGRESS) {
                            point.captureProgress = MAX_CAPTURE_PROGRESS;
                            point.capturedBy = 'blue';
                            // Victory for blue team
                            showGameEndScreen(true);
                        }
                    }
                } else if (redInfluence > 0 && blueInfluence === 0) {
                    // Red team uncontested
                    if (point.capturedBy === 'blue') {
                        // Decay blue progress first
                        point.captureProgress -= CAPTURE_RATE * redInfluence;
                        if (point.captureProgress <= 0) {
                            point.captureProgress = 0;
                            point.capturedBy = null;
                        }
                    } else {
                        // Build red progress
                        point.captureProgress -= CAPTURE_RATE * redInfluence;
                        if (point.captureProgress <= -MAX_CAPTURE_PROGRESS) {
                            point.captureProgress = -MAX_CAPTURE_PROGRESS;
                            point.capturedBy = 'red';
                            // Victory for red team
                            showGameEndScreen(false);
                        }
                    }
                }
                // If contested (both teams present), progress pauses
                
                updateScoreUI();
            });

                            textEl.style.left = "50%";
                            textEl.style.transform = "translate(-50%, -50%)";
                            textEl.style.fontSize = "14px";
                            textEl.style.fontWeight = "bold";
                            textEl.style.color = "#fff";
                            textEl.style.textShadow = "0 0 5px black";
                            slotEl.appendChild(textEl);
                        }
                        textEl.textContent = (remaining / 1000).toFixed(1);

                        slotEl.classList.remove('ready');
                    } else {
                        const overlayEl = slotEl.querySelector('.cooldown-overlay');
                        if (overlayEl) overlayEl.style.height = '0%';

                        const textEl = slotEl.querySelector(".cooldown-text");
                        if (textEl) textEl.remove();

                        slotEl.classList.add('ready');
                    }
                }
            });
        }

        // --- DRAWING ---
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, "#0a0a18");
            gradient.addColorStop(1, "#151530");

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "rgba(255,255,255,0.05)";
            for (let i = 0; i < 30; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                ctx.fillRect(x, y, 1, 1);
            }
        }

        function drawHexGrid() {
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            const hexHeight = HEX_SIZE * 2;
            const hexWidth = Math.sqrt(3) * HEX_SIZE;
            const vertDist = hexHeight * 3 / 4;
            const startX = Math.floor(camera.x / hexWidth) * hexWidth - hexWidth;
            const startY = Math.floor(camera.y / vertDist) * vertDist - vertDist;
            const endX = startX + canvas.width + hexWidth * 2;
            const endY = startY + canvas.height + vertDist * 2;

            ctx.lineWidth = 1;
            ctx.shadowBlur = 0;

            for (let y = startY; y < endY; y += vertDist) {
                for (let x = startX; x < endX; x += hexWidth) {
                    const offsetX = (y / vertDist) % 2 === 1 ? hexWidth / 2 : 0;

                    const dx = (x + offsetX) - player.x;
                    const dy = y - player.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const maxDist = 600;

                    const alpha = Math.max(0.05, 1 - dist / maxDist);
                    ctx.strokeStyle = `rgba(0, 255, 255, ${alpha * 0.2})`;

                    drawHexagon(x + offsetX, y, HEX_SIZE);
                }
            }

            ctx.restore();
        }

        function drawHexagon(x, y, size) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i;
                const xPos = x + size * Math.cos(angle);
                const yPos = y + size * Math.sin(angle);
                if (i === 0) ctx.moveTo(xPos, yPos);
                else ctx.lineTo(xPos, yPos);
            }
            ctx.closePath();
            ctx.stroke();
        }

        function drawSpawnAreas() {
            if (gameState !== 'playing' && gameState !== 'paused') return;

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            const time = Date.now() / 600;
            const pulse = (Math.sin(Date.now() / 400) + 1) / 2;

            // Draw blue spawn area
            const blueGradient = ctx.createRadialGradient(
                blueSpawnArea.x, blueSpawnArea.y, blueSpawnArea.radius * 0.2,
                blueSpawnArea.x, blueSpawnArea.y, blueSpawnArea.radius
            );
            blueGradient.addColorStop(0, `rgba(0, 170, 255, ${0.15 + 0.15 * pulse})`);
            blueGradient.addColorStop(1, 'rgba(0, 170, 255, 0)');
            ctx.fillStyle = blueGradient;
            ctx.beginPath();
            ctx.arc(blueSpawnArea.x, blueSpawnArea.y, blueSpawnArea.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = `rgba(0, 170, 255, ${0.6 + 0.4 * pulse})`;
            ctx.lineWidth = 3;
            ctx.shadowColor = colors.blueTeam;
            ctx.shadowBlur = 40;
            ctx.beginPath();
            ctx.arc(blueSpawnArea.x, blueSpawnArea.y, blueSpawnArea.radius, 0, Math.PI * 2);
            ctx.stroke();

            // Draw red spawn area
            const redGradient = ctx.createRadialGradient(
                redSpawnArea.x, redSpawnArea.y, redSpawnArea.radius * 0.2,
                redSpawnArea.x, redSpawnArea.y, redSpawnArea.radius
            );
            redGradient.addColorStop(0, `rgba(255, 51, 51, ${0.15 + 0.15 * pulse})`);
            redGradient.addColorStop(1, 'rgba(255, 51, 51, 0)');
            ctx.fillStyle = redGradient;
            ctx.beginPath();
            ctx.arc(redSpawnArea.x, redSpawnArea.y, redSpawnArea.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = `rgba(255, 51, 51, ${0.6 + 0.4 * pulse})`;
            ctx.lineWidth = 3;
            ctx.shadowColor = colors.redTeam;
            ctx.shadowBlur = 40;
            ctx.beginPath();
            ctx.arc(redSpawnArea.x, redSpawnArea.y, redSpawnArea.radius, 0, Math.PI * 2);
            ctx.stroke();

            ctx.restore();
        }

        function drawCapturePoints() {
            if (gameState !== 'playing' && gameState !== 'paused') return;

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            capturePoints.forEach(point => {
                // Determine color based on capture progress
                let color;
                if (point.capturedBy === 'blue') {
                    const intensity = point.captureProgress / MAX_CAPTURE_PROGRESS;
                    color = `rgba(0, 170, 255, ${0.3 + 0.3 * intensity})`;
                } else if (point.capturedBy === 'red') {
                    const intensity = -point.captureProgress / MAX_CAPTURE_PROGRESS;
                    color = `rgba(255, 51, 51, ${0.3 + 0.3 * intensity})`;
                } else {
                    // Neutral
                    color = 'rgba(255, 255, 0, 0.3)';
                }

                // Draw capture point
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(point.x, point.y, point.radius, 0, Math.PI * 2);
                ctx.fill();

                // Draw border
                ctx.strokeStyle = color.replace('0.3', '0.8');
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(point.x, point.y, point.radius, 0, Math.PI * 2);
                ctx.stroke();

                // Draw capture progress indicator
                if (point.captureProgress !== 0) {
                    const progressAngle = (Math.abs(point.captureProgress) / MAX_CAPTURE_PROGRESS) * Math.PI * 2;
                    const startAngle = point.captureProgress > 0 ? -Math.PI / 2 : Math.PI / 2;
                    const endAngle = startAngle + (point.captureProgress > 0 ? progressAngle : -progressAngle);

                    ctx.strokeStyle = point.captureProgress > 0 ? 'rgba(0, 170, 255, 0.8)' : 'rgba(255, 51, 51, 0.8)';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, point.radius + 10, startAngle, endAngle);
                    ctx.stroke();
                }

                // Draw center icon
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⚑', point.x, point.y);
                
                // Draw progress percentage
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.font = 'bold 16px Arial';
                const progressText = point.capturedBy === 'blue' ? 
                    `${Math.round(point.captureProgress)}%` : 
                    point.capturedBy === 'red' ? 
                    `${Math.round(-point.captureProgress)}%` : 
                    '0%';
                ctx.fillText(progressText, point.x, point.y + 40);
            });

            ctx.restore();
        }

// --- UPDATED DRAWING WITH TEAM OUTLINES ---
		function drawPlayer() {
    if (gameState !== 'playing' && gameState !== 'paused') return;
    if (player.isDead) return;

    ctx.save();
    ctx.translate(player.x - camera.x, player.y - camera.y);
    ctx.rotate(player.angle);

    const heroColor = activeHero ? activeHero.color : colors.player;

    // Apply invisibility effect
    if (player.isInvisible) {
        ctx.globalAlpha = 0.3;
    }

    // Draw team outline
    ctx.strokeStyle = 'rgba(0, 170, 255, 0.5)';
    ctx.lineWidth = 3;
    ctx.shadowColor = 'rgba(0, 170, 255, 0.8)';

    ctx.beginPath();

    ctx.lineTo(-PLAYER_SIZE, PLAYER_SIZE * 0.7);

    coreGradient.addColorStop(0.5, heroColor);
    coreGradient.addColorStop(1, 'transparent');
    ctx.fillStyle = coreGradient;
    ctx.beginPath();

}
