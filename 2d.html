		function drawProjectiles() {
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            projectiles.forEach(p => {
                const heroColor = p.owner ? p.owner.hero.color : colors.player;

                const trailLength = p.size * 6; 
                const angle = Math.atan2(p.vy, p.vx);

                const trailGradient = ctx.createLinearGradient(
                    p.x - Math.cos(angle) * trailLength, p.y - Math.sin(angle) * trailLength,
                    p.x, p.y
                );
                
                if (p.type === 'silencerRound') {
                    trailGradient.addColorStop(0, 'transparent');
                    trailGradient.addColorStop(0.6, 'rgba(157, 41, 51, 0.3)');
                    trailGradient.addColorStop(1, '#9D2933');
                } else {
                    trailGradient.addColorStop(0, 'transparent');
                    trailGradient.addColorStop(0.6, `${heroColor}55`);
                    trailGradient.addColorStop(1, heroColor);
                }

                ctx.strokeStyle = trailGradient;
                ctx.lineWidth = Math.max(2, p.size * 0.8);
                ctx.beginPath();
                ctx.moveTo(p.x - Math.cos(angle) * trailLength, p.y - Math.sin(angle) * trailLength);
                ctx.lineTo(p.x, p.y);
                ctx.stroke();

                const coreGradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 1.5);
                coreGradient.addColorStop(0, '#fff');
                coreGradient.addColorStop(0.3, p.type === 'silencerRound' ? '#9D2933' : heroColor);
                coreGradient.addColorStop(1, 'transparent');

                ctx.fillStyle = coreGradient;
                ctx.shadowColor = p.type === 'silencerRound' ? '#9D2933' : heroColor;
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * 1.2, 0, Math.PI * 2);
                ctx.fill();

                const pulse = (Math.sin(Date.now() / 100 + p.x + p.y) + 1) / 2;
                ctx.strokeStyle = `rgba(255,255,255,${0.2 + 0.5 * pulse})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (1.5 + 0.5 * pulse), 0, Math.PI * 2);
                ctx.stroke();
            });

            ctx.restore();
        }

        function drawActiveAbilities() {
            ctx.save();
            ctx.translate(-camera.x, -camera.y);
            activeAbilities.forEach(a => {
                if (a.type === 'explosion') {
                    const opacity = a.lifetime / 200;
                    ctx.fillStyle = `rgba(0, 255, 255, ${opacity * 0.3})`;
                    ctx.strokeStyle = `rgba(0, 255, 255, ${opacity})`;
                    ctx.beginPath();
                    ctx.arc(a.x, a.y, a.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                } else if (a.type === 'radiantShockwave') {
                    const opacity = a.lifetime / 300;
                    const gradient = ctx.createLinearGradient(
                        a.x, a.y,
                        a.x + Math.cos(a.angle) * a.range,
                        a.y + Math.sin(a.angle) * a.range
                    );
                    gradient.addColorStop(0, `rgba(255, 215, 0, ${opacity})`);
                    gradient.addColorStop(1, `rgba(255, 215, 0, 0)`);
                    
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(a.x + Math.cos(a.angle) * a.range, a.y + Math.sin(a.angle) * a.range);
                    ctx.stroke();
                    
                    ctx.strokeStyle = `rgba(255, 215, 0, ${opacity * 0.5})`;
                    ctx.lineWidth = 2;
                    const rippleRadius = (1 - opacity) * a.range;
                    ctx.beginPath();
                    ctx.arc(a.x, a.y, rippleRadius, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (a.type === 'guardBash') {
                    const opacity = a.lifetime / 200;
                    ctx.fillStyle = `rgba(255, 215, 0, ${opacity * 0.3})`;
                    ctx.strokeStyle = `rgba(255, 215, 0, ${opacity})`;
                    ctx.lineWidth = 3;
                    
                    const width = a.range;
                    const height = a.range / 2;
                    ctx.save();
                    ctx.translate(a.x, a.y);
                    ctx.rotate(a.angle);
                    ctx.fillRect(0, -height/2, width, height);
                    ctx.strokeRect(0, -height/2, width, height);
                    ctx.restore();
                } else if (a.type === 'wardProjection') {
                    const opacity = 0.8;
                    ctx.save();
                    ctx.translate(a.x, a.y);
                    ctx.rotate(a.rotation);
                    
                    ctx.fillStyle = `rgba(255, 215, 0, ${opacity * 0.2})`;
                    ctx.strokeStyle = `rgba(255, 215, 0, ${opacity})`;
                    ctx.lineWidth = 2;
                    
                    for (let i = 0; i < 6; i++) {
                        const angle = (Math.PI / 3) * i;
                        const x = Math.cos(angle) * a.radius;
                        const y = Math.sin(angle) * a.radius;
                        
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(x, y);
                        ctx.stroke();
                        
                        ctx.save();
                        ctx.translate(x, y);
                        drawHexagon(0, 0, 10);
                        ctx.stroke();
                        ctx.restore();
                    }
                    
                    drawHexagon(0, 0, a.radius * 0.5);
                    ctx.fill();
                    ctx.stroke();
                    
                    const healthPercent = a.health / a.maxHealth;
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(-a.radius, -a.radius - 15, a.radius * 2, 5);
                    ctx.fillStyle = 'rgba(0, 255, 0, 0.8)';
                    ctx.fillRect(-a.radius, -a.radius - 15, a.radius * 2 * healthPercent, 5);
                    
                    ctx.restore();
                } else if (a.type === 'bulwarkLeap') {
                    const progress = 1 - (a.lifetime / 600);
                    if (progress < 0.5) {
                        const trailProgress = progress * 2;
                        const gradient = ctx.createLinearGradient(
                            a.startX, a.startY,
                            a.endX, a.endY
                        );
                        gradient.addColorStop(0, `rgba(255, 215, 0, ${1 - trailProgress})`);
                        gradient.addColorStop(trailProgress, `rgba(255, 215, 0, ${1 - trailProgress})`);
                        gradient.addColorStop(1, 'rgba(255, 215, 0, 0)');
                        
                        ctx.strokeStyle = gradient;
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.moveTo(a.startX, a.startY);
                        ctx.lineTo(a.endX, a.endY);
                        ctx.stroke();
                    } else {
                        const impactProgress = (progress - 0.5) * 2;
                        const radius = impactProgress * a.tauntRadius;
                        
                        ctx.strokeStyle = `rgba(255, 215, 0, ${1 - impactProgress})`;
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.arc(a.endX, a.endY, radius, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                } else if (a.type === 'sanctuaryDome') {
                    const opacity = 0.8;
                    const gradient = ctx.createRadialGradient(a.x, a.y, 0, a.x, a.y, a.radius);
                    gradient.addColorStop(0, `rgba(255, 215, 0, ${opacity * 0.1})`);
                    gradient.addColorStop(0.7, `rgba(255, 215, 0, ${opacity * 0.05})`);
                    gradient.addColorStop(1, `rgba(255, 215, 0, 0)`);
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(a.x, a.y, a.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.save();
                    ctx.translate(a.x, a.y);
                    ctx.rotate(a.rotation);
                    
                    const hexSize = 30;
                    const hexHeight = hexSize * 2;
                    const hexWidth = Math.sqrt(3) * hexSize;
                    const vertDist = hexHeight * 3 / 4;
                    
                    ctx.strokeStyle = `rgba(255, 215, 0, ${opacity * 0.3})`;
                    ctx.lineWidth = 1;
                    
                    for (let y = -a.radius; y < a.radius; y += vertDist) {
                        for (let x = -a.radius; x < a.radius; x += hexWidth) {
                            const offsetX = (y / vertDist) % 2 === 1 ? hexWidth / 2 : 0;
                            const dist = Math.sqrt((x + offsetX) * (x + offsetX) + y * y);
                            
                            if (dist < a.radius - hexSize) {
                                const hexOpacity = opacity * 0.3 * (0.5 + 0.5 * Math.sin(Date.now() / 500 + x / 50 + y / 50));
                                ctx.strokeStyle = `rgba(255, 215, 0, ${hexOpacity})`;
                                drawHexagon(x + offsetX, y, hexSize);
                                ctx.stroke();
                            }
                        }
                    }
                    
                    ctx.restore();
                    
                    ctx.strokeStyle = `rgba(255, 215, 0, ${opacity})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(a.x, a.y, a.radius, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (a.type === 'shieldSparks') {
                    const opacity = a.lifetime / 100;
                    for (let i = 0; i < 5; i++) {
                        const angle = (Math.PI * 2 / 5) * i + Date.now() / 100;
                        const dist = 10 * (1 - opacity);
                        const x = a.x + Math.cos(angle) * dist;
                        const y = a.y + Math.sin(angle) * dist;
                        
                        ctx.fillStyle = `rgba(255, 215, 0, ${opacity})`;
                        ctx.beginPath();
                        ctx.arc(x, y, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else if (a.type === 'repulsionWave') {
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.2)';
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.5)';
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.arc(a.x, a.y, a.radius, a.angle - Math.PI/4, a.angle + Math.PI/4);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                } else if (a.type === 'singularityOrb') {
                    const lifeProgress = a.lifetime / a.totalLifetime;
                    ctx.save();
                    ctx.translate(a.x, a.y);
                    ctx.rotate(a.rotation);
                    ctx.globalAlpha = lifeProgress;
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.8)';
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI * 2); ctx.stroke();
                    ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI * 2); ctx.stroke();
                    ctx.rotate(-a.rotation * 2);
                    ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI * 2); ctx.stroke();
                    ctx.restore();
                } else if (a.type === 'gravityWell') {
                    const fadeProgress = a.fadeProgress || 0;
                    const opacity = 0.3 - fadeProgress * 0.3;
                    
                    ctx.strokeStyle = `rgba(0, 255, 255, ${opacity})`;
                    ctx.lineWidth = 1;
                    for(let i = 0; i < 3; i++) {
                        ctx.globalAlpha = opacity - i * 0.1;
                        ctx.beginPath();
                        ctx.arc(a.x, a.y, a.radius * (1 + i * 0.3), 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    ctx.globalAlpha = 1;
                } else if (a.type === 'eventHorizon') {
                    const fadeProgress = a.fadeProgress || 0;
                    const opacity = 0.8 - fadeProgress * 0.8;
                    
                    ctx.save();
                    ctx.translate(a.x, a.y);
                    ctx.rotate(a.rotation);
                    const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, a.radius);
                    gradient.addColorStop(0, `rgba(0, 0, 0, ${0.8 * opacity})`);
                    gradient.addColorStop(0.5, `rgba(255, 215, 0, ${0.2 * opacity})`);
                    gradient.addColorStop(1, `rgba(255, 215, 0, 0)`);
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(0, 0, a.radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.strokeStyle = `rgba(255, 215, 0, ${0.5 * opacity})`;
                    ctx.lineWidth = 3;
                    for(let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        ctx.arc(0, 0, a.radius * (0.2 + i * 0.3), 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    ctx.restore();
                } else if (a.type === 'shadowKnife') {
                    const opacity = a.lifetime / 150;
                    ctx.save();
                    ctx.translate(a.x, a.y);
                    ctx.rotate(a.angle);
                    
                    // Draw knife slash
                    ctx.strokeStyle = `rgba(157, 41, 51, ${opacity})`;
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(0, -a.range/2);
                    ctx.lineTo(a.range, 0);
                    ctx.lineTo(0, a.range/2);
                    ctx.stroke();
                    
                    // Draw hit effect
                    if (a.hit) {
                        ctx.fillStyle = `rgba(255, 0, 0, ${opacity * 0.5})`;
                        ctx.beginPath();
                        ctx.arc(a.range, 0, 20, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    
                    ctx.restore();
                } else if (a.type === 'shadowmeld') {
                    const opacity = a.lifetime / 3000;
                    ctx.fillStyle = `rgba(0, 0, 0, ${opacity * 0.5})`;
                    ctx.beginPath();
                    ctx.arc(a.x, a.y, 50, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.strokeStyle = `rgba(157, 41, 51, ${opacity * 0.3})`;
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        ctx.arc(a.x, a.y, 20 + i * 15, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                } else if (a.type === 'phaseDash') {
                    const opacity = a.lifetime / 200;
                    const gradient = ctx.createLinearGradient(a.startX, a.startY, a.endX, a.endY);
                    gradient.addColorStop(0, `rgba(157, 41, 51, ${opacity})`);
                    gradient.addColorStop(1, `rgba(157, 41, 51, 0)`);
                    
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(a.startX, a.startY);
                    ctx.lineTo(a.endX, a.endY);
                    ctx.stroke();
                    
                    // Draw shadow copies
                    for (let i = 0; i < 3; i++) {
                        const t = (i + 1) / 4;
                        const x = a.startX + (a.endX - a.startX) * t;
                        const y = a.startY + (a.endY - a.startY) * t;
                        
                        ctx.fillStyle = `rgba(157, 41, 51, ${opacity * (1 - t)})`;
                        ctx.beginPath();
                        ctx.arc(x, y, PLAYER_SIZE * 0.8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else if (a.type === 'deathMark') {
                    const opacity = a.lifetime / 500;
                    
                    // Draw death mark on target
                    ctx.strokeStyle = `rgba(157, 41, 51, ${opacity})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(a.target.x - 20, a.target.y - 20);
                    ctx.lineTo(a.target.x + 20, a.target.y + 20);
                    ctx.moveTo(a.target.x + 20, a.target.y - 20);
                    ctx.lineTo(a.target.x - 20, a.target.y + 20);
                    ctx.stroke();
                    
                    // Draw execution effect
                    ctx.fillStyle = `rgba(255, 0, 0, ${opacity * 0.5})`;
                    ctx.beginPath();
                    ctx.arc(a.target.x, a.target.y, 30, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Draw teleport trail
                    const gradient = ctx.createLinearGradient(a.startX, a.startY, a.target.x, a.target.y);
                    gradient.addColorStop(0, `rgba(157, 41, 51, ${opacity})`);
                    gradient.addColorStop(1, `rgba(157, 41, 51, 0)`);
                    
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(a.startX, a.startY);
                    ctx.lineTo(a.target.x, a.target.y);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            });
            ctx.restore();
        }        
        
        function drawReselectProgress() {
            if (gameState !== 'playing' || rHoldProgress <= 0) return;
            ctx.save();
            ctx.translate(player.x - camera.x, player.y - camera.y);
            const radius = PLAYER_SIZE + 15;
            const startAngle = -Math.PI / 2;
            const endAngle = startAngle + (Math.PI * 2 * rHoldProgress);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(0, 0, radius, startAngle, endAngle);
            ctx.stroke();
            ctx.restore();
        }

        function drawReselectHint() {
            if (gameState !== 'playing' || !isPlayerInSpawnArea()) return;
            ctx.save();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.font = 'bold 24px "Orbitron", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'black';
            ctx.shadowBlur = 5;
            ctx.fillText('Hold R to change hero', canvas.width / 2, 100);
            ctx.restore();
        }

        function drawParticles() {
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            particles.forEach(p => {
                const flicker = 0.6 + 0.4 * Math.sin(Date.now() / 200 + p.x * 0.1 + p.y * 0.1);
                ctx.globalAlpha = p.opacity * flicker;

                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 2);
                gradient.addColorStop(0, 'rgba(255,255,255,0.9)');
                gradient.addColorStop(0.4, colors.particle);
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
                ctx.fill();

                if (Math.random() < 0.0005) {
                    const streakLength = 50;
                    ctx.strokeStyle = `rgba(255,255,255,0.7)`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - streakLength, p.y - streakLength * 0.3);
                    ctx.stroke();
                }
            });

            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function drawCursor() {
            if (gameState === 'mainMenu' || gameState === 'paused' || gameState === 'heroSelect') return;
            ctx.strokeStyle = colors.cursor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(mouse.x - 10, mouse.y);
            ctx.lineTo(mouse.x + 10, mouse.y);
            ctx.moveTo(mouse.x, mouse.y - 10);
            ctx.lineTo(mouse.x, mouse.y + 10);
            ctx.stroke();
        }
        
        function drawMinimap() {
            if (gameState !== 'playing') return;
            
            const scale = 200 / WORLD_WIDTH;
            
            // Clear minimap
            minimapCtx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            minimapCtx.fillRect(0, 0, 200, 200);
            
            // Draw capture points
            capturePoints.forEach(point => {
                let color;
                if (point.capturedBy === 'blue') {
                    color = 'rgba(0, 170, 255, 0.8)';
                } else if (point.capturedBy === 'red') {
                    color = 'rgba(255, 51, 51, 0.8)';
                } else {
                    color = 'rgba(255, 255, 0, 0.8)';
                }
                
                minimapCtx.fillStyle = color;
                minimapCtx.beginPath();
                minimapCtx.arc(point.x * scale, point.y * scale, 5, 0, Math.PI * 2);
                minimapCtx.fill();
            });
            
            // Draw spawn areas
            minimapCtx.strokeStyle = 'rgba(0, 170, 255, 0.5)';
            minimapCtx.lineWidth = 1;
            minimapCtx.beginPath();
            minimapCtx.arc(blueSpawnArea.x * scale, blueSpawnArea.y * scale, blueSpawnArea.radius * scale, 0, Math.PI * 2);
            minimapCtx.stroke();
            
            minimapCtx.strokeStyle = 'rgba(255, 51, 51, 0.5)';
            minimapCtx.beginPath();
            minimapCtx.arc(redSpawnArea.x * scale, redSpawnArea.y * scale, redSpawnArea.radius * scale, 0, Math.PI * 2);
            minimapCtx.stroke();
            
            // Draw player
            minimapCtx.fillStyle = 'rgba(0, 255, 255, 1)';
            minimapCtx.beginPath();
            minimapCtx.arc(player.x * scale, player.y * scale, 3, 0, Math.PI * 2);
            minimapCtx.fill();
            
            // Draw teammates
            teammates.forEach(teammate => {
                if (teammate.isDead) return;
                minimapCtx.fillStyle = 'rgba(0, 170, 255, 0.8)';
                minimapCtx.beginPath();
                minimapCtx.arc(teammate.x * scale, teammate.y * scale, 2, 0, Math.PI * 2);
                minimapCtx.fill();
            });
            
            // Draw enemies
            enemies.forEach(enemy => {
                if (enemy.isDead) return;
                minimapCtx.fillStyle = 'rgba(255, 51, 51, 0.8)';
                minimapCtx.beginPath();
                minimapCtx.arc(enemy.x * scale, enemy.y * scale, 2, 0, Math.PI * 2);
                minimapCtx.fill();
            });
            
            // Draw viewport
            minimapCtx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            minimapCtx.lineWidth = 1;
            minimapCtx.strokeRect(
                camera.x * scale,
                camera.y * scale,
                canvas.width * scale,
                canvas.height * scale
            );
        }

        // --- MAIN GAME LOOP ---
        function gameLoop() {
            updatePlayer();
            updateCamera();
            updateParticles();
            updateReselect();
            updateProjectiles();
            updateActiveAbilities();
            updateReload();
            updateCooldownUI();
            updateCapturePoints();
            
            // Update AI teammates
            teammates.forEach(teammate => {
                updateAI(teammate);
            });
            
            // Update AI enemies
            enemies.forEach(enemy => {
                updateAI(enemy);
            });
            
            // Check for respawns
            if (player.isDead && Date.now() - player.deathTime > RESPAWN_TIME) {
                respawnCharacter(player);
            }
            
            teammates.forEach(teammate => {
                if (teammate.isDead && Date.now() - teammate.deathTime > RESPAWN_TIME) {
                    respawnCharacter(teammate);
                }
            });
            
            enemies.forEach(enemy => {
                if (enemy.isDead && Date.now() - enemy.deathTime > RESPAWN_TIME) {
                    respawnCharacter(enemy);
                }
            });
            
            // Update UI
            if (gameState === 'playing') {
                if (isPlayerInSpawnArea()) {
                    heroUIEl.classList.add('hero-ui-active');
                } else {
                    heroUIEl.classList.remove('hero-ui-active');
                }
                const healthPercent = (player.health / player.maxHealth) * 100;
                healthBarFillEl.style.width = `${healthPercent}%`;
                
                updateTeamUI();
            }

            // Draw everything
            drawBackground();
            drawHexGrid();
            drawParticles();
            drawSpawnAreas();
            drawCapturePoints();
            drawTeammates();
            drawEnemies();
            drawActiveAbilities();
            drawProjectiles();
            drawPlayer();
            drawReselectProgress();
            drawReselectHint();
            drawCursor();
            drawMinimap();

            requestAnimationFrame(gameLoop);
        }

        // --- START ---
        init();
        gameLoop();
    </script>
